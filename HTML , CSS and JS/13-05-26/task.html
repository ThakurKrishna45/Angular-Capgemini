<!DOCTYPE html>
<html>
<head>
  <title>Promise Example</title>
</head>
<body>

<h2>JavaScript Promise Example</h2>

<script>
  const success = false;

  const myPromise = new Promise((resolve, reject) => {

    if (success) {
      resolve("Promise Fulfilled");
    } else {
      reject("Promise Rejected");
    }

  });

myPromise
  .then((result) => {
    console.log(result);
    document.body.innerHTML += "<p>" + result + "</p>";
  })
  .catch((error) => {
    console.log(error);
    document.body.innerHTML += "<p>" + error + "</p>";
  })
  .finally(() => {
    console.log("Promise completed");
    document.body.innerHTML += "<p>Promise completed</p>";
  });
</script>

</body>
</html>
