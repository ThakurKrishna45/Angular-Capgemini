<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1 id="main-heading">Travel Agency</h1>

        <nav>
             <a href="index.html">Home</a>
            <a href="booking.html">Booking</a>
            <a href="gallery.html">Gallery</a>
        </nav>
    </header>

    <section>
        <form >

            <fieldset>
                <legend>Personal Information</legend>

                <label>Name:</label>
                <input type="text" placeholder="Enter your name">

                <label>Address:</label>
                <input type="text" placeholder="Enter address">

                <label>Email:</label>
                <input type="email" placeholder="Enter email">

                <label>Phone Number:</label>
                <input type="tel" placeholder="9876543210">
            </fieldset>

            <fieldset>
                <legend>Travel Details</legend>

                <label>Number of Travelers:</label>
                <input type="number">

                <label>Travel Date:</label>
                <input type="date">

                <label>Select Destination:</label>

                <select>
                    <option>Jammu and Kashmir</option>
                    <option>Uttrakhand</option>
                    <option>Goa</option>
                    <option>Lakshdweep</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>Travel Class</legend>

                <input type="radio" name="class"> Economy
                <input type="radio" name="class"> Business
                <input type="radio" name="class"> First Class
            </fieldset>

            <fieldset>
                <legend>Additional Services</legend>

                <input type="checkbox"> Travel Insurance
                <input type="checkbox"> Airport Pickup
                <input type="checkbox"> Guided Tours
            </fieldset>

            <fieldset>
                <legend>Special Request</legend>

                <textarea rows="5" placeholder="Write here..."></textarea>
            </fieldset>

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>

        </form>
    </section>

    <footer>
        <p>Email: travel@gmail.com</p>
        <p>Phone: 9876543210</p>
        <p>Instagram | Facebook | Twitter</p>
    </footer>
</body>
</html>
