<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Different Input Types Form</title>
   <link rel="stylesheet" href="index.css">
</head>
<body>
<header>Demonstration of Different types on Inputs in Html</header>
    <form>

        <p>
            <label>Username:</label>
            <input type="text">
        </p>

        <p>
            <label>Password:</label>
            <input type="password">
        </p>

        <p>
            <label>Email:</label>
            <input type="email">
        </p>

        <p>
            <label>Phone:</label>
            <input type="tel">
        </p>

        <p>
            <label>Date of Birth:</label>
            <input type="date">
        </p>

        <p>
            <label>Time:</label>
            <input type="time">
        </p>

        <p>
            <label>Age:</label>
            <input type="number">
        </p>

        <p>
            <label>Website:</label>
            <input type="url">
        </p>

        <p>
            <label>Search:</label>
            <input type="search">
        </p>

        <p>
            <label>Range:</label>
            <input type="range">
        </p>

        <p>
            <label>Upload File:</label>
            <input type="file">
        </p>

        <p>
            <label>Gender:</label>
            <input type="radio" name="gender"> Male
            <input type="radio" name="gender"> Female
        </p>

        <p>
            <label>Skills:</label>
            <input type="checkbox"> HTML
            <input type="checkbox"> CSS
            <input type="checkbox"> JavaScript
        </p>

        <p>
            <label>Comments:</label>
            <textarea></textarea>
        </p>

        <p>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </p>

    </form>

</body>
</html>
